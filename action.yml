name: mcp-guard permission check
description: Evaluate an MCP call, manifest, or proposed agent action against a local policy.
author: mcp-guard contributors

branding:
  icon: shield
  color: blue

inputs:
  command:
    description: Run check, scan, or the no-forward gateway-check.
    required: false
    default: check
  input-file:
    description: Path to the action, manifest, or MCP tools/call JSON.
    required: true
  policy-file:
    description: Path to the local mcp-guard YAML policy.
    required: true
  format:
    description: "Report format: json, markdown, html, or sarif."
    required: false
    default: json
  output-file:
    description: Path where the generated report will be written.
    required: false
    default: mcp-guard-report.json
  fail-on:
    description: "Decision threshold that fails the step: never, warn, or deny."
    required: false
    default: deny
  python-version:
    description: Python version used to run mcp-guard.
    required: false
    default: "3.12"

outputs:
  exit-code:
    description: "mcp-guard exit code: 0 allow, 1 warn, 2 deny, 3 input/config error."
    value: ${{ steps.guard.outputs.exit-code }}
  decision:
    description: Normalized allow, warn, deny, or error outcome.
    value: ${{ steps.guard.outputs.decision }}
  report-path:
    description: Report path supplied through output-file.
    value: ${{ steps.guard.outputs.report-path }}

runs:
  using: composite
  steps:
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: ${{ inputs.python-version }}
    - name: Install mcp-guard from this action
      shell: bash
      run: python -m pip install "$GITHUB_ACTION_PATH"
    - name: Evaluate policy
      id: guard
      shell: bash
      env:
        MCP_GUARD_COMMAND: ${{ inputs.command }}
        MCP_GUARD_INPUT: ${{ inputs.input-file }}
        MCP_GUARD_POLICY: ${{ inputs.policy-file }}
        MCP_GUARD_FORMAT: ${{ inputs.format }}
        MCP_GUARD_OUTPUT: ${{ inputs.output-file }}
        MCP_GUARD_FAIL_ON: ${{ inputs.fail-on }}
      run: |
        case "$MCP_GUARD_COMMAND" in
          check) input_flag="--action" ;;
          scan) input_flag="--mcp-config" ;;
          gateway-check) input_flag="--request" ;;
          *) echo "mcp-guard action: command must be check, scan, or gateway-check." >&2; exit 3 ;;
        esac
        case "$MCP_GUARD_FORMAT" in
          json|markdown|html|sarif) ;;
          *) echo "mcp-guard action: format must be json, markdown, html, or sarif." >&2; exit 3 ;;
        esac
        case "$MCP_GUARD_FAIL_ON" in
          never|warn|deny) ;;
          *) echo "mcp-guard action: fail-on must be never, warn, or deny." >&2; exit 3 ;;
        esac

        mkdir -p "$(dirname "$MCP_GUARD_OUTPUT")"
        set +e
        python -m mcp_guard "$MCP_GUARD_COMMAND" \
          "$input_flag" "$MCP_GUARD_INPUT" \
          --policy "$MCP_GUARD_POLICY" \
          --format "$MCP_GUARD_FORMAT" \
          --output "$MCP_GUARD_OUTPUT"
        code=$?
        set -e

        case "$code" in
          0) decision="allow" ;;
          1) decision="warn" ;;
          2) decision="deny" ;;
          *) decision="error" ;;
        esac
        echo "exit-code=$code" >> "$GITHUB_OUTPUT"
        echo "decision=$decision" >> "$GITHUB_OUTPUT"
        echo "report-path=$MCP_GUARD_OUTPUT" >> "$GITHUB_OUTPUT"

        if [ "$code" -ge 3 ]; then
          exit "$code"
        fi
        if [ "$MCP_GUARD_FAIL_ON" = "warn" ] && [ "$code" -ge 1 ]; then
          exit "$code"
        fi
        if [ "$MCP_GUARD_FAIL_ON" = "deny" ] && [ "$code" -eq 2 ]; then
          exit "$code"
        fi
        exit 0
